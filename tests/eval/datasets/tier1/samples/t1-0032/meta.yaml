description: |
  C-class: models/user/user.go — concurrent change to the same call site
  in GenerateEmailAuthorizationCode:
    * fork extracts the expiry into a new helper EmailAuthCodeExpiry()
      and calls GenerateAuthToken(ctx, u.ID, EmailAuthCodeExpiry(), purpose).
    * upstream changes GenerateAuthToken's signature, inserting a new
      loginSourceID parameter: GenerateAuthToken(ctx, u.ID,
      optional.None[int64](), <expiry>, purpose).
  Correct golden combines BOTH: GenerateAuthToken(ctx, u.ID,
  optional.None[int64](), EmailAuthCodeExpiry(), purpose) (hand-resolved,
  `go build` verified). The automated forgejo run (2026-05-22) kept fork's
  4-arg call and dropped upstream's loginSourceID param — a textbook
  M1 (call-site) + M3 (interface contract) loss that judge passed at 0.70.
  This is the highest-value regression sample. Independent human golden,
  NOT the system's merge output.
