description: |
  C-class coverage: models/user/user.go — concurrent change to the same
  call site in GenerateEmailAuthorizationCode:
    * fork extracts the expiry into a new helper EmailAuthCodeExpiry()
      and calls GenerateAuthToken(ctx, u.ID, EmailAuthCodeExpiry(), purpose).
    * upstream changes GenerateAuthToken's signature, inserting a new
      loginSourceID parameter: GenerateAuthToken(ctx, u.ID,
      optional.None[int64](), <expiry>, purpose).
  Golden combines BOTH: GenerateAuthToken(ctx, u.ID, optional.None[int64](),
  EmailAuthCodeExpiry(), purpose) (hand-resolved, `go build` verified) —
  independent human output, NOT the system's merge (dataset.md §1.4). The
  conflict shape is a textbook M1 (call-site) + M3 (interface contract);
  the automated forgejo run (2026-05-22) dropped upstream's loginSourceID
  param here — that post-escalation regression is guarded by a unit test,
  while this sample provides the C-class coverage + correct golden
  reference. Under single-shot Tier-1 eval the expected outcome is
  escalation (no human present).
