name: judge
version: 1
inputs:
  - config
  - file_categories
  - file_decision_records
  - file_diffs
  - fork_divergence_map
  - forks_profile
  - judge_repair_rounds
  - judge_verdict
  - judge_verdicts_log
  - merge_base_commit
  - status
output_schema: JudgeVerdict
gates:
  - J-SYSTEM
  - J-FILE-REVIEW
  - J-VERDICT
  - J-BATCH-REVIEW
  - J-RE-EVALUATE
  - META-JUDGE-SYSTEM
  - META-JUDGE-REVIEW
forbidden:
  - writes_state
  - direct_llm_call
collaboration: review_only
requires_human_options: false
