name: planner
version: 1
inputs:
  - config
  - config_drifts
  - dependency_graph
  - file_categories
  - file_classifications
  - file_diffs
  - forks_profile
  - merge_base_commit
  - merge_plan
  - plan_disputes
  - plan_review_log
  - pollution_audit
  - rename_pairs
  - shadow_conflicts
  - status
output_schema: MergePlan
gates:
  - P-SYSTEM
  - P-CLASSIFICATION
  - P-REVISION
  - P-EVAL-SYSTEM
  - P-EVALUATION
  - P-RISK-SCORE
  - P-RISK-SCORE-SYSTEM
  - META-PLAN-SYSTEM
  - META-PLAN-REVIEW
forbidden:
  - direct_llm_call
collaboration: compute
requires_human_options: false
